apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus-ingress-laith
  namespace: monitoring
spec:
  ingressClassName: nginx
  rules:
    - host: prome.erfan-us.info
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus-stack-kube-prom-prometheus
                port:
                  number: 9090